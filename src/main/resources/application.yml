server:
  port: 8080

spring:
  application:
    name: lottery-football
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

data-refresh:
  days-back: 30
  days-forward: 7
  target-zone: Asia/Shanghai

football-data:
  historical-matches-path: classpath:data/historical_matches.csv

worldcup:
  simulation-count: 50000
  schedule-source-zone: America/New_York
  user-config-path: config/user-config.json
  schedule-update:
    enabled: true
    source-url: https://raw.githubusercontent.com/openfootball/worldcup/master/2026--usa/cup.txt
    timeout-seconds: 10
    target-zone: ${data-refresh.target-zone}
  espn-update:
    enabled: true
    scoreboard-url-template: https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates={start}-{end}
    timeout-seconds: 10
    target-zone: ${data-refresh.target-zone}
  max-goals-lambda: 4.5
  min-goals-lambda: 0.2
  host-team-goal-factor: 1.10
  home-team-goal-factor: 1.06
  seed-team-goal-factor: 1.85
  handicap-smoothing-factor: 0.274
  handicap-max-smoothing: 0.685

champions-league:
  espn-update:
    enabled: true
    scoreboard-url-template: https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard?limit=1000&dates={start}-{end}
    qualifying-scoreboard-url-template: https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions_qual/scoreboard?limit=500&dates={start}-{end}
    timeout-seconds: 10
    target-zone: ${data-refresh.target-zone}

club-competitions:
  schedule-update:
    enabled: true
    espn-url-template: https://site.api.espn.com/apis/site/v2/sports/soccer/{league}/scoreboard?limit=1000&dates={start}-{end}
    sportsdb-url-template: https://www.thesportsdb.com/api/v1/json/123/eventsround.php?id={leagueId}&r={round}&s={season}
    sportsdb-season-url-template: https://www.thesportsdb.com/api/v1/json/123/eventsseason.php?id={leagueId}&s={season}
    sportsdb-next-url-template: https://www.thesportsdb.com/api/v1/json/123/eventsnextleague.php?id={leagueId}
    sportsdb-past-url-template: https://www.thesportsdb.com/api/v1/json/123/eventspastleague.php?id={leagueId}
    fotmob-league-url-template: https://www.fotmob.com/api/data/leagues?id={leagueId}&ccode3=CHN&season={season}
    sofascore-seasons-url-template: https://www.sofascore.com/api/v1/unique-tournament/{tournamentId}/seasons
    sofascore-events-url-template: https://www.sofascore.com/api/v1/unique-tournament/{tournamentId}/season/{seasonId}/events/{direction}/{page}
    sofascore-team-events-url-template: https://www.sofascore.com/api/v1/team/{teamId}/events/last/{page}
    futbol24-live-url-template: https://api.futbol24.com/api/live/matches?_=0&date={date}&lang=en&sort=league
    futbol24-parallelism: 16
    timeout-seconds: 15
    target-zone: ${data-refresh.target-zone}
    parallelism: 12
    sportsdb-future-rounds: 6
    cache-path: config/club-competition-schedules.json

sporttery:
  result-update:
    enabled: true
    api-url: https://webapi.sporttery.cn/gateway/uniform/football/getUniformMatchResultV1.qry
    calculator-api-url: https://webapi.sporttery.cn/gateway/uniform/football/getMatchCalculatorV1.qry
    odds-history-api-url: https://webapi.sporttery.cn/gateway/uniform/football/getOddsHistoryV1.qry
    source-page-url: https://www.lottery.gov.cn/jc/zqsgkj/
    calculator-source-page-url: https://www.sporttery.cn/jc/jsq/zqbf/
    timeout-seconds: 12
    page-size: 100
    refresh-minutes: 30
    odds-lookback-days: 30
    result-lookback-days: 30
    recent-days-back: 1
    future-days: 2
    force-future-days: 4
    target-zone: ${data-refresh.target-zone}
    cache-path: config/sporttery-market-selections.json
    historical-odds-data-path: classpath:data/historical_odds_data.csv
